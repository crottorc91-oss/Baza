<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcade Harvester PRO | Data Tool</title>
    <script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.js"></script>
    <style>
        body { 
            background: #09090b; color: #10b981; font-family: 'Courier New', Courier, monospace; 
            margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; 
        }
        h1 { color: #38bdf8; margin-top: 0; border-bottom: 1px solid #334155; padding-bottom: 10px; font-size: 24px; text-transform: uppercase; }
        .control-panel { background: #18181b; border: 1px solid #27272a; padding: 20px; border-radius: 4px; margin-bottom: 15px; display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
        .stats { color: #a1a1aa; font-size: 14px; display: flex; gap: 20px; width: 100%; margin-top: 10px; padding-top: 10px; border-top: 1px dashed #3f3f46; }
        .stats span { color: #facc15; font-weight: bold; }
        input[type="file"] { display: none; }
        .btn { background: #0ea5e9; color: #fff; border: none; padding: 12px 24px; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .btn:hover { background: #0284c7; }
        .btn-green { background: #10b981; color: #000; }
        .btn-green:hover { background: #059669; }
        .btn:disabled { background: #3f3f46; color: #71717a; cursor: not-allowed; }
        
        #terminal { 
            flex: 1; background: #000; padding: 15px; border-radius: 4px; overflow-y: auto; 
            border: 1px solid #27272a; font-size: 13px; line-height: 1.5; box-shadow: inset 0 0 20px rgba(0,0,0,1);
        }
        .log-info { color: #cbd5e1; }
        .log-success { color: #10b981; }
        .log-warn { color: #facc15; }
        .log-error { color: #ef4444; }
        .log-sys { color: #38bdf8; font-weight: bold; }
    </style>
</head>
<body>

    <h1>⚙️ Arcade Harvester PRO v3.0</h1>
    
    <div class="control-panel">
        <button class="btn" id="btnSelectFolder">[+] СКАНИРОВАТЬ ПАПКУ</button>
        <button class="btn btn-green" id="btnSelectFiles">[+] ВЫБРАТЬ ФАЙЛЫ/ZIP</button>
        
        <input type="file" id="folderInput" webkitdirectory directory multiple>
        <input type="file" id="fileInput" multiple accept=".nes,.sfc,.smc,.md,.gen,.smd,.bin,.ngp,.ngc,.gba,.gbc,.gb,.zip">
        
        <div class="stats">
            <div>Лимит Тома: <span>95 MB</span></div>
            <div>Текущий Том: <span id="statVol">1</span></div>
            <div>Заполнено: <span id="statSize">0.00</span> MB</div>
            <div>РОМов найдено: <span id="statRoms">0</span></div>
        </div>
    </div>

    <div id="terminal">
        <span class="log-sys">Arcade OS Data Processor. Ожидание ввода данных...</span><br>
    </div>

<script>
    const MAX_PART_SIZE = 95 * 1024 * 1024; // 95 МБ лимит для GitHub Releases
    
    const coreMap = {
        'md': 'smd', 'gen': 'smd', 'smd': 'smd', 'bin': 'smd',
        'smc': 'snes', 'sfc': 'snes',
        'ngp': 'ngp', 'ngc': 'ngp',
        'gba': 'gba', 'gbc': 'gba', 'gb': 'gba',
        'nes': 'nes'
    };

    let githubCovers = [];
    window.usedCovers = new Set();
    const foundRoms = [];

    const terminal = document.getElementById('terminal');
    function logMsg(msg, type = 'log-info') {
        const span = document.createElement('span');
        span.className = type;
        span.textContent = msg + '\n';
        terminal.appendChild(span);
        terminal.scrollTop = terminal.scrollHeight;
    }

    function updateStats(vol, sizeBytes, romsCount) {
        document.getElementById('statVol').textContent = vol;
        document.getElementById('statSize').textContent = (sizeBytes / 1024 / 1024).toFixed(2);
        document.getElementById('statRoms').textContent = romsCount;
    }

    // --- ИНИЦИАЛИЗАЦИЯ БАЗЫ ---
    fetch('covers_list.txt')
        .then(r => r.ok ? r.text() : Promise.reject(r.status))
        .then(text => {
            githubCovers = text.split('\n').map(s => s.trim()).filter(Boolean);
            logMsg(`[SYS] База обложек No-Intro загружена: ${githubCovers.length} записей.`, 'log-sys');
        })
        .catch(e => logMsg(`[ERR] Файл covers_list.txt не найден! Парсинг обложек невозможен.`, 'log-error'));

    function getWords(name) {
        let clean = name.replace(/\([^)]*\)/g, '').replace(/\[[^\]]*\]/g, ''); 
        clean = clean.replace(/\.[^/.]+$/, ""); 
        if (clean.normalize) clean = clean.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        clean = clean.toLowerCase().replace(/[^a-z0-9а-яё]/g, ' ');
        clean = clean.replace(/([a-zа-яё])([0-9]+)/g, '$1 $2').replace(/([0-9]+)([a-zа-яё])/g, '$1 $2');
        let words = clean.split(/\s+/).filter(Boolean);
        const romanMap = { 'i': '1', 'ii': '2', 'iii': '3', 'iv': '4', 'v': '5', 'vi': '6', 'vii': '7', 'viii': '8' };
        return words.map(w => romanMap[w] || w);
    }

    async function checkImageExists(url) { 
        try { const r = await fetch(url, { method: 'HEAD' }); return r.ok; } 
        catch (e) { return false; }
    }

    async function fetchNetCover(gameName, sysType) {
        const repoMap = {
            "nes": ["Nintendo - Nintendo Entertainment System"],
            "snes": ["Nintendo - Super Nintendo Entertainment System"],
            "smd": ["Sega - Mega Drive - Genesis"],
            "ngp": ["SNK - Neo Geo Pocket", "SNK - Neo Geo Pocket Color"], 
            "gba": ["Nintendo - Game Boy Advance", "Nintendo - Game Boy Color", "Nintendo - Game Boy"]
        };
        const folders = repoMap[sysType] || [];
        if (folders.length === 0 || githubCovers.length === 0) return null;

        const localWords = getWords(gameName);
        const localSquashed = localWords.join('');
        const localNumbers = localWords.filter(w => !isNaN(w));

        let scoredMatches = githubCovers.map(name => {
            const dbWords = getWords(name);
            const dbSquashed = dbWords.join('');
            const dbNumbers = dbWords.filter(w => !isNaN(w));
            let score = 0;

            if (dbSquashed === localSquashed) score += 100;
            else if (dbSquashed.includes(localSquashed) || localSquashed.includes(dbSquashed)) score += 40;

            const matchedWords = localWords.filter(w => dbWords.includes(w));
            score += matchedWords.length * 10;
            if (matchedWords.length > 0 && matchedWords.length === localWords.length) score += 50;

            if (localNumbers.length > 0 && dbNumbers.length > 0) {
                if (localNumbers[0] === dbNumbers[0]) score += 40;
                else score -= 100; 
            }
            return { name, score };
        }).filter(m => m.score > 0);

        scoredMatches.sort((a, b) => b.score - a.score);
        let matches = scoredMatches.map(m => m.name).slice(0, 3);

        for (const match of matches) {
            const safeName = match.replace(/\.png$/i, '');
            for (const folder of folders) {
                const url = `https://raw.githubusercontent.com/libretro/libretro-thumbnails/master/${encodeURIComponent(folder)}/Named_Boxarts/${encodeURIComponent(safeName)}.png`;
                if (await checkImageExists(url)) {
                    if (!window.usedCovers.has(url)) {
                        window.usedCovers.add(url);
                        return url;
                    }
                }
            }
        }
        return null;
    }

    // --- РЕКУРСИВНЫЙ РАСПАКОВЩИК (Очистка от мусора) ---
    async function extractMatryoshka(fileName, fileDataU8, depth = 0) {
        if (depth > 5) {
            logMsg(`[WARN] Превышена глубина архива: ${fileName}`, 'log-warn');
            return;
        }
        const ext = fileName.split('.').pop().toLowerCase();
        if (ext === 'zip') {
            try {
                const unzipped = fflate.unzipSync(fileDataU8);
                for (const [innerPath, innerData] of Object.entries(unzipped)) {
                    if (innerData.length === 0 || innerPath.endsWith('/')) continue;
                    const innerName = innerPath.split('/').pop();
                    await extractMatryoshka(innerName, innerData, depth + 1);
                }
            } catch(e) {
                logMsg(`[ERR] Битый ZIP-архив: ${fileName}`, 'log-error');
            }
        } else if (coreMap[ext] || ext === 'nes') {
            foundRoms.push({
                originalName: fileName,
                sys: coreMap[ext] || 'nes',
                data: fileDataU8
            });
            updateStats(1, 0, foundRoms.length);
        }
    }

    // --- СКАЧИВАНИЕ ФАЙЛА (Сборка Тома) ---
    function triggerDownload(u8array, filename) {
        const blob = new Blob([u8array], { type: 'application/zip' });
        const a = document.createElement('a');
        const url = URL.createObjectURL(blob);
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 10000); 
    }

    // --- ГЛАВНЫЙ КОНВЕЙЕР ---
    async function startProcessing(files) {
        document.getElementById('btnSelectFolder').disabled = true;
        document.getElementById('btnSelectFiles').disabled = true;
        terminal.innerHTML = '';
        foundRoms.length = 0; 
        updateStats(1, 0, 0);

        logMsg(`[JOB STARTED] Обработка файлов: ${files.length}...`, 'log-sys');

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const arrayBuf = await file.arrayBuffer();
            const u8 = new Uint8Array(arrayBuf);
            await extractMatryoshka(file.name, u8, 0);
        }

        if (foundRoms.length === 0) {
            logMsg(`[ABORT] Не найдено ни одного поддерживаемого ROM-файла.`, 'log-error');
            resetButtons();
            return;
        }
        logMsg(`[INFO] Распаковка завершена. Найдено чистых игр: ${foundRoms.length}\n`, 'log-sys');

        let currentOuterData = {};
        let currentOuterSize = 0;
        let partNumber = 1;
        const registry = [];

        for (let i = 0; i < foundRoms.length; i++) {
            const rom = foundRoms[i];
            const cleanName = rom.originalName.replace(/\.[^/.]+$/, "");
            logMsg(`[${i+1}/${foundRoms.length}] Сборка: ${cleanName} [${rom.sys.toUpperCase()}]`);

            let coverData = null;
            let finalCoverName = null;
            
            // Пытаемся найти обложку
            const coverUrl = await fetchNetCover(cleanName, rom.sys);
            if (coverUrl) {
                // Пытаемся скачать с 1 повтором при ошибке сети
                for(let attempt = 1; attempt <= 2; attempt++) {
                    try {
                        const imgRes = await fetch(coverUrl);
                        if (imgRes.ok) {
                            coverData = new Uint8Array(await imgRes.arrayBuffer());
                            finalCoverName = `${cleanName}.png`;
                            logMsg(`  -> [OK] Обложка загружена`, 'log-success');
                            break;
                        }
                    } catch(err) {
                        if (attempt === 2) logMsg(`  -> [ERR] Сбой загрузки обложки`, 'log-error');
                        else await new Promise(r => setTimeout(r, 500)); // Ждем полсекунды перед retry
                    }
                }
            } else {
                logMsg(`  -> [SKIP] Обложка не найдена в базе`, 'log-warn');
            }

            // Упаковываем внутренний ZIP (Ром + Картинка)
            const innerZipData = {};
            innerZipData[rom.originalName] = rom.data;
            if (coverData) innerZipData[finalCoverName] = coverData;

            const innerZipped = fflate.zipSync(innerZipData, { level: 6 });
            const innerZipSize = innerZipped.byteLength;
            const finalZipName = `${cleanName}.zip`;

            // ПРОВЕРКА ЛИМИТА ТОМА (95 МБ)
            if (currentOuterSize + innerZipSize > MAX_PART_SIZE && Object.keys(currentOuterData).length > 0) {
                logMsg(`\n[LIMIT] Том ${partNumber} достиг ${Math.round(currentOuterSize/1024/1024)} MB. Выгрузка...`, 'log-warn');
                
                const outerZipped = fflate.zipSync(currentOuterData, { level: 0 }); 
                triggerDownload(outerZipped, `ArcadeHarvester_Part_${partNumber}.zip`);
                
                partNumber++;
                currentOuterData = {}; 
                currentOuterSize = 0;
                updateStats(partNumber, 0, foundRoms.length);
                
                await new Promise(r => setTimeout(r, 1500)); // Пауза на скачивание
            }

            // Кладем мини-архив в Том (со структурой папок: games/nes/...)
            currentOuterData[`games/${rom.sys}/${finalZipName}`] = innerZipped;
            currentOuterSize += innerZipSize;
            updateStats(partNumber, currentOuterSize, foundRoms.length);

            // Пишем в общий реестр
            registry.push({
                title: cleanName,
                sys: rom.sys,
                url: `https://твой-домен.com/games/${rom.sys}/${finalZipName}`
            });

            await new Promise(r => setTimeout(r, 100)); // Защита от бана GitHub
        }

        // ЗАВЕРШЕНИЕ (Выгрузка последнего тома и JSON)
        if (Object.keys(currentOuterData).length > 0) {
            logMsg(`\n[JSON] Создание master_registry.json...`, 'log-sys');
            const jsonString = JSON.stringify(registry, null, 2);
            currentOuterData['master_registry.json'] = new TextEncoder().encode(jsonString);

            logMsg(`[ZIP] Упаковка финального ТОМА ${partNumber}...`, 'log-sys');
            
            setTimeout(() => {
                const finalZipped = fflate.zipSync(currentOuterData, { level: 0 });
                const finalName = partNumber > 1 ? `ArcadeHarvester_Part_${partNumber}.zip` : `ArcadeHarvester_FULL.zip`;
                
                triggerDownload(finalZipped, finalName);
                logMsg(`\n[JOB DONE] Все данные успешно упакованы и выгружены!`, 'log-success');
                resetButtons();
            }, 500);
        }
    }

    function resetButtons() {
        document.getElementById('btnSelectFolder').disabled = false;
        document.getElementById('btnSelectFiles').disabled = false;
        document.getElementById('folderInput').value = '';
        document.getElementById('fileInput').value = '';
    }

    document.getElementById('btnSelectFolder').onclick = () => document.getElementById('folderInput').click();
    document.getElementById('btnSelectFiles').onclick = () => document.getElementById('fileInput').click();

    document.getElementById('folderInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) startProcessing(Array.from(e.target.files));
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files.length > 0) startProcessing(Array.from(e.target.files));
    });

</script>
</body>
</html>
